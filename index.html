<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Car Runner PRO MAX</title>
    <style>
        body { margin: 0; overflow: hidden; background: #0b0f19; font-family: sans-serif; }
        canvas { display: block; width: 100vw; height: 80vh; }
        
        /* Control Buttons Style */
        #controls {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 20vh;
            display: flex;
        }
        .btn {
            flex: 1;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid white;
            color: white;
            font-size: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
        }
    </style>
</head>
<body>

    <canvas id="game"></canvas>
    
    <div id="controls">
        <div class="btn" onclick="lane = 0">LEFT</div>
        <div class="btn" onclick="lane = 1">CENTER</div>
        <div class="btn" onclick="lane = 2">RIGHT</div>
    </div>

    <script>
        const c = document.getElementById("game");
        const ctx = c.getContext("2d");
        c.width = window.innerWidth;
        c.height = window.innerHeight * 0.8; // Canvas ko buttons ke liye jagah di

        let lane = 1;
        let score = 0;
        let speed = 8;
        let enemies = [];
        let gameActive = true;

        function getLaneX(l) {
            return (c.width / 3) * l + (c.width / 6) - 25;
        }

        function drawCar(x, y, color) {
            ctx.fillStyle = color;
            ctx.fillRect(x, y, 50, 80);
        }

        function update() {
            if (!gameActive) return;
            ctx.clearRect(0, 0, c.width, c.height);

            // Road draw
            ctx.fillStyle = "#333";
            ctx.fillRect(0, 0, c.width, c.height);

            if (Math.random() < 0.05) {
                enemies.push({ x: getLaneX(Math.floor(Math.random()*3)), y: -100 });
            }

            enemies.forEach((e, i) => {
                e.y += speed;
                drawCar(e.x, e.y, "red");
                
                let playerX = getLaneX(lane);
                if (Math.abs(playerX - e.x) < 40 && Math.abs(c.height - 150 - e.y) < 70) {
                    gameActive = false;
                    alert("Game Over! Score: " + score);
                    location.reload();
                }
                if (e.y > c.height) { enemies.splice(i, 1); score++; }
            });

            drawCar(getLaneX(lane), c.height - 150, "cyan");
            requestAnimationFrame(update);
        }

        update();
    </script>
</body>
</html>
