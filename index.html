<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Cyber Runner</title>
    <style>
        body { margin: 0; background: #090d16; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; color: white; font-family: 'Segoe UI', sans-serif; }
        #scoreBoard { font-size: 1.5rem; font-weight: bold; margin-bottom: 15px; color: #38bdf8; text-shadow: 0 0 10px rgba(56,189,248,0.5); }
        canvas { background: linear-gradient(to bottom, #1e1b4b, #0f172a); border: 3px solid #ec4899; border-radius: 16px; box-shadow: 0 0 25px rgba(236, 72, 153, 0.3); max-width: 100%; max-height: 70vh; }
        .info { margin-top: 15px; font-size: 1rem; color: #94a3b8; text-align: center; }
    </style>
</head>
<body>
    <div id="scoreBoard">Score: 0 | High Score: 0</div>
    <canvas id="gameCanvas" width="800" height="400"></canvas>
    <div class="info">Tap Canvas or Press SPACEBAR to Jump</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let score = 0;
        let highScore = localStorage.getItem('runnerHighScore') || 0;
        let gameActive = true;

        let player = { x: 80, y: 310, width: 35, height: 45, vy: 0, gravity: 0.65, jumpForce: -13, isGrounded: false };
        let obstacles = [];
        let spawnTimer = 0;
        let gameSpeed = 6;

        function update() {
            if (!gameActive) return;
            player.vy += player.gravity;
            player.y += player.vy;
            if (player.y >= 305) { player.y = 305; player.vy = 0; player.isGrounded = true; }

            spawnTimer++;
            if (spawnTimer > Math.random() * 50 + 60) {
                let size = Math.random() * 20 + 20;
                obstacles.push({ x: canvas.width, y: 350 - size, width: 25, height: size });
                spawnTimer = 0;
                if (gameSpeed < 14) gameSpeed += 0.15;
            }

            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].x -= gameSpeed;
                if (player.x < obstacles[i].x + obstacles[i].width && player.x + player.width > obstacles[i].x && player.y < obstacles[i].y + obstacles[i].height && player.y + player.height > obstacles[i].y) {
                    gameActive = false;
                    if (score > highScore) { highScore = score; localStorage.setItem('runnerHighScore', highScore); }
                }
                if (obstacles[i].x + obstacles[i].width < 0) { obstacles.splice(i, 1); score++; }
            }
            document.getElementById('scoreBoard').innerText = `Score: ${score} | High Score: ${highScore}`;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#ec4899';
            ctx.fillRect(0, 350, canvas.width, 5); // Ground Line

            // Neon Player Character
            ctx.fillStyle = '#38bdf8';
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#38bdf8';
            ctx.fillRect(player.x, player.y, player.width, player.height);

            // Cyber Obstacles
            ctx.fillStyle = '#f43f5e';
            ctx.shadowColor = '#f43f5e';
            obstacles.forEach(obs => ctx.fillRect(obs.x, obs.y, obs.width, obs.height));
            ctx.shadowBlur = 0; // Reset blur

            if (!gameActive) {
                ctx.fillStyle = 'rgba(15, 23, 42, 0.85)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 28px sans-serif';
                ctx.textAlign = "center";
                ctx.fillText('💥 GAME OVER 💥', canvas.width/2, 180);
                ctx.font = '18px sans-serif';
                ctx.fillText('Tap Screen or Press Space to Restart', canvas.width/2, 230);
            }
        }

        function loop() { update(); draw(); requestAnimationFrame(loop); }
        function jump() { if (player.isGrounded && gameActive) { player.vy = player.jumpForce; player.isGrounded = false; } else if (!gameActive) { obstacles = []; score = 0; gameSpeed = 6; gameActive = true; } }
        window.addEventListener('keydown', (e) => { if (e.code === 'Space') { e.preventDefault(); jump(); } });
        canvas.addEventListener('click', jump);
        loop();
    </script>
</body>
</html>
