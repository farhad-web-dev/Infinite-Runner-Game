<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canvas Runner Game</title>
    <style>
        body { margin: 0; background: #0f172a; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; color: white; font-family: sans-serif; }
        canvas { background: #1e293b; border: 4px solid #38bdf8; border-radius: 8px; max-width: 100%; max-height: 70vh; }
        .info { margin-top: 10px; font-size: 1.1rem; text-align: center; }
    </style>
</head>
<body>
    <div id="scoreBoard">Score: 0 | High Score: 0</div>
    <canvas id="gameCanvas" width="800" height="400"></canvas>
    <div class="info">Tap Screen or Press SPACEBAR to Jump</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let score = 0;
        let highScore = localStorage.getItem('runnerHighScore') || 0;
        let gameActive = true;

        let player = { x: 50, y: 320, width: 30, height: 40, vy: 0, gravity: 0.6, jumpForce: -12, isGrounded: false };
        let obstacles = [];
        let spawnTimer = 0;
        let gameSpeed = 5;

        function update() {
            if (!gameActive) return;

            // Player Physics
            player.vy += player.gravity;
            player.y += player.vy;
            if (player.y >= 320) { player.y = 320; player.vy = 0; player.isGrounded = true; }

            // Obstacle Spawning
            spawnTimer++;
            if (spawnTimer > Math.random() * 60 + 70) {
                obstacles.push({ x: canvas.width, y: 330, width: 20, height: 30 });
                spawnTimer = 0;
                if (gameSpeed < 12) gameSpeed += 0.1;
            }

            // Obstacle Moving & Collision
            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].x -= gameSpeed;
                if (player.x < obstacles[i].x + obstacles[i].width && player.x + player.width > obstacles[i].x && player.y < obstacles[i].y + obstacles[i].height && player.y + player.height > obstacles[i].y) {
                    gameOver();
                }
                if (obstacles[i].x + obstacles[i].width < 0) { obstacles.splice(i, 1); score++; }
            }
            document.getElementById('scoreBoard').innerText = `Score: ${score} | High Score: ${highScore}`;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#475569';
            ctx.fillRect(0, 350, canvas.width, 50); // Base Ground

            ctx.fillStyle = '#38bdf8'; // Player
            ctx.fillRect(player.x, player.y, player.width, player.height);

            ctx.fillStyle = '#f43f5e'; // Obstacles
            obstacles.forEach(obs => ctx.fillRect(obs.x, obs.y, obs.width, obs.height));

            if (!gameActive) {
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#fff';
                ctx.font = '30px sans-serif';
                ctx.fillText('Game Over! Tap/Press Space to Restart', 150, 200);
            }
        }

        function loop() { update(); draw(); requestAnimationFrame(loop); }
        function jump() { if (player.isGrounded && gameActive) { player.vy = player.jumpForce; player.isGrounded = false; } else if (!gameActive) { restart(); } }
        function gameOver() { gameActive = false; if (score > highScore) { highScore = score; localStorage.setItem('runnerHighScore', highScore); } }
        function restart() { obstacles = []; score = 0; gameSpeed = 5; gameActive = true; }

        window.addEventListener('keydown', (e) => { if (e.code === 'Space') jump(); });
        canvas.addEventListener('touchstart', () => { jump(); });
        canvas.addEventListener('mousedown', () => { jump(); });
        loop();
    </script>
</body>
</html>
